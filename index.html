<!DOCTYPE html>
<html>
<head>
  <title>Music Digital Twin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎧 Music Listening Twin</h1>

<div class="form">
  <input type="text" id="song" placeholder="Song name">
  <input type="text" id="artist" placeholder="Artist">
  
  <select id="mood">
    <option value="happy">Happy</option>
    <option value="sad">Sad</option>
    <option value="chill">Chill</option>
    <option value="energetic">Energetic</option>
  </select>

  <button onclick="addSong()">Add</button>
</div>

<h2>📊 Stats</h2>
<p id="totalSongs">Total Songs: 0</p>
<p id="topMood">Top Mood: -</p>

<h2>🎵 History</h2>
<ul id="history"></ul>

<script src="app.js"></script>

<p id="totalSongs">Total Songs: -</p>
<p id="topMood">Top Mood: -</p>
<p id="topArtist">Top Artist: -</p>

<h2>Ask your Music Twin 🤖</h2>
<input type="text" id="question" placeholder="Ask something...">
<button onclick="askQuestion()">Ask</button>
<p id="answer"></p>

<ul id="history"></ul>

</body>
</html>
